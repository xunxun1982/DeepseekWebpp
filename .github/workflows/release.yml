name: Release Package

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      version:
        description: Release tag/version to package
        required: true
        type: string

permissions:
  contents: write

env:
  GO_VERSION: "1.26.3"
  NODE_VERSION: "26.3.0"
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.release.tag_name }}

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run tests
        shell: pwsh
        run: node --test

      - name: Build release zip
        shell: pwsh
        run: |
          $version = '${{ env.RELEASE_VERSION }}'
          .\scripts\package-release.ps1 -Version $version
          $zipPath = "dist\DeepseekWebpp-$version.zip"
          if (-not (Test-Path -LiteralPath $zipPath)) {
            throw "Release zip was not created: $zipPath"
          }

      - name: Upload zip to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          files: dist/DeepseekWebpp-${{ env.RELEASE_VERSION }}.zip
          fail_on_unmatched_files: true
          overwrite_files: true
